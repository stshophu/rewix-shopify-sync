name: Rewix → Vaitto (Romanelli EU-WAR-1)

on:
  schedule:
    - cron: '20 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - run: npm install pg
      - name: Run sync
        env:
          REWIX_BASE_URL:   ${{ secrets.REWIX_BASE_URL }}
          REWIX_API_KEY:    ${{ secrets.REWIX_API_KEY }}
          REWIX_PASSWORD:   ${{ secrets.REWIX_PASSWORD }}
          REWIX_IMAGE_BASE: ${{ secrets.REWIX_IMAGE_BASE }}
          REWIX_REPO_PATH:  '.'
          VAITTO_DB_URL:    ${{ secrets.VAITTO_DB_URL }}
          # VAITTO_DRY_RUN: '1'
        run: node rewix_sync_vaitto.js
