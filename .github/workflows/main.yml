name: Rewix to Shopify Product Sync

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

concurrency:
  group: rewix-shopify-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Restore sync timestamp
        uses: actions/cache@v4
        with:
          path: .last_sync_timestamp
          key: sync-timestamp-${{ github.run_id }}
          restore-keys: |
            sync-timestamp-

      - name: Run product sync
        env:
          REWIX_BASE_URL: ${{ secrets.REWIX_BASE_URL }}
          REWIX_API_KEY: ${{ secrets.REWIX_API_KEY }}
          REWIX_PASSWORD: ${{ secrets.REWIX_PASSWORD }}
          REWIX_IMAGE_BASE: ${{ secrets.REWIX_IMAGE_BASE }}
          SHOPIFY_STORE: ${{ secrets.SHOPIFY_STORE }}
          SHOPIFY_TOKEN: ${{ secrets.SHOPIFY_TOKEN }}
        run: node sync.js --full
