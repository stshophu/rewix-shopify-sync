name: Merge Duplicate Variants (Manual)

on:
  workflow_dispatch:
    inputs:
      apply:
        description: "Type 'apply' to actually merge & delete. Leave blank for a dry run."
        required: false
        default: ''

jobs:
  merge-duplicates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm install

      - name: Run merge script
        env:
          SHOPIFY_STORE: ${{ secrets.SHOPIFY_STORE }}
          SHOPIFY_TOKEN: ${{ secrets.SHOPIFY_TOKEN }}
        run: |
          if [ "${{ github.event.inputs.apply }}" = "apply" ]; then
            node merge_duplicate_variants.cjs --apply
          else
            node merge_duplicate_variants.cjs
          fi

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: merge-duplicate-variants-report
          path: merge_duplicate_variants_report.csv
